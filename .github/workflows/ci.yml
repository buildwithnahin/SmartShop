name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend deps
        if: ${{ hashFiles('backend/package.json') != '' }}
        run: cd backend && npm ci

      - name: Lint backend
        if: ${{ hashFiles('backend/package.json') != '' }}
        run: cd backend && npm run lint --if-present

      - name: Test backend
        if: ${{ hashFiles('backend/package.json') != '' }}
        run: cd backend && npm test --if-present

  mobile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install mobile deps
        if: ${{ hashFiles('mobile/package.json') != '' }}
        run: cd mobile && npm ci

      - name: Lint mobile
        if: ${{ hashFiles('mobile/package.json') != '' }}
        run: cd mobile && npm run lint --if-present

      - name: Test mobile
        if: ${{ hashFiles('mobile/package.json') != '' }}
        run: cd mobile && npm test --if-present
